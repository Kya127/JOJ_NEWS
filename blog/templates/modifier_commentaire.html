{% extends "base.html" %}

{% block title %}Modifier le commentaire{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8">
            <h2>Modifier le commentaire</h2>
            <p class="text-muted">Article : {{ article.titre }}</p>
            
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="{{ form.contenu.id_for_label }}" class="form-label">{{ form.contenu.label }}</label>
                    {{ form.contenu }}
                    {% if form.contenu.errors %}
                        <div class="text-danger">
                            {{ form.contenu.errors }}
                        </div>
                    {% endif %}
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Enregistrer les modifications</button>
                    <a href="{% url 'articles:detail' article.id %}" class="btn btn-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
